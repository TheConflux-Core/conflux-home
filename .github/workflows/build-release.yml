name: Build & Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux (.deb + .AppImage) ──
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri:build

      - name: Collect .sig files
        run: |
          mkdir -p /tmp/sigs
          find src-tauri/target/release/bundle/deb -name '*.sig' -exec cp {} /tmp/sigs/ \;
          find src-tauri/target/release/bundle/appimage -name '*.sig' -exec cp {} /tmp/sigs/ \;

      - name: Upload .sig artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-sigs
          path: /tmp/sigs/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.sig
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  # ── Windows (.msi) ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri:build

      - name: Debug bundle contents
        shell: bash
        run: |
          echo "=== msi bundle ==="
          find src-tauri/target/release/bundle/msi -type f 2>/dev/null || echo "(no msi dir)"
          echo "=== all .sig files ==="
          find src-tauri/target/release/bundle -name '*.sig' 2>/dev/null || echo "(none found)"

      - name: Collect .sig files
        shell: bash
        run: |
          mkdir -p /tmp/sigs
          find src-tauri/target/release/bundle -name '*.sig' -exec cp {} /tmp/sigs/ \;

      - name: Upload .sig artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-sigs
          path: /tmp/sigs/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig

  # ── macOS (.dmg — x64 + aarch64) ──
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x64
          - target: aarch64-apple-darwin
            arch: aarch64
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri:build -- --target ${{ matrix.target }}

      - name: Debug bundle contents
        run: |
          echo "=== dmg bundle ==="
          find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -type f 2>/dev/null || echo "(no dmg dir)"
          echo "=== all .sig files ==="
          find "src-tauri/target/${{ matrix.target }}/release/bundle" -name '*.sig' 2>/dev/null || echo "(none found)"

      - name: Collect .sig files
        run: |
          mkdir -p /tmp/sigs
          find "src-tauri/target/${{ matrix.target }}/release/bundle" -name '*.sig' -exec cp {} /tmp/sigs/ \;

      - name: Upload .sig artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-sigs
          path: /tmp/sigs/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg.sig

  # ── Generate updates.json (all platforms) ──
  generate-updates-json:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all .sig artifacts
        uses: actions/download-artifact@v4
        with:
          path: sigs/
          pattern: '*-sigs'

      - name: Debug downloaded sigs
        run: |
          echo "=== sigs/ contents ==="
          find sigs/ -type f 2>/dev/null || echo "(empty)"

      - name: Generate updates.json
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VER="${VERSION#v}"

          DEB_SIG=$(find sigs/ -name '*.deb.sig' -exec cat {} \; | head -1)
          APPIMAGE_SIG=$(find sigs/ -name '*.AppImage.sig' -exec cat {} \; | head -1)
          MSI_SIG=$(find sigs/ -name '*.msi.sig' -exec cat {} \; | head -1)

          # macOS: prefer .dmg.sig, fall back to .app.tar.gz.sig
          DMG_X64_SIG=$(find sigs/ -name '*.dmg.sig' -exec cat {} \; | head -1)
          DMG_ARM_SIG="$DMG_X64_SIG"
          # If separate macos artifact dirs exist, try to differentiate
          if [ -d sigs/macos-x64-sigs ] && [ -d sigs/macos-aarch64-sigs ]; then
            DMG_X64_SIG=$(find sigs/macos-x64-sigs/ -name '*.sig' -exec cat {} \; | head -1)
            DMG_ARM_SIG=$(find sigs/macos-aarch64-sigs/ -name '*.sig' -exec cat {} \; | head -1)
          fi

          REPO="${{ github.repository }}"

          cat > updates.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "${APPIMAGE_SIG}",
                "url": "https://github.com/${REPO}/releases/latest/download/Conflux.Home_${VER}_amd64.AppImage"
              },
              "linux-deb-x86_64": {
                "signature": "${DEB_SIG}",
                "url": "https://github.com/${REPO}/releases/latest/download/Conflux.Home_${VER}_amd64.deb"
              },
              "windows-x86_64": {
                "signature": "${MSI_SIG}",
                "url": "https://github.com/${REPO}/releases/latest/download/Conflux.Home_${VER}_x64.msi"
              },
              "darwin-x86_64": {
                "signature": "${DMG_X64_SIG}",
                "url": "https://github.com/${REPO}/releases/latest/download/Conflux.Home_${VER}_x64.dmg"
              },
              "darwin-aarch64": {
                "signature": "${DMG_ARM_SIG}",
                "url": "https://github.com/${REPO}/releases/latest/download/Conflux.Home_${VER}_aarch64.dmg"
              }
            }
          }
          EOF

      - name: Upload updates.json to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" updates.json --clobber

  # ── Android (.apk) ──
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & SDK components
        run: |
          sdkmanager --install \
            "ndk;27.2.12479018" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install npm dependencies
        run: npm ci

      - name: Init Tauri Android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
        run: npm run tauri android init

      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
        run: npm run tauri android build -- --apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
