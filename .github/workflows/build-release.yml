name: Build & Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux (.deb + .AppImage) ──
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri:build

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.sig
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  # ── Windows (.msi) ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri:build

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  # ── macOS (.dmg — x64 + aarch64) ──
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x64
          - target: aarch64-apple-darwin
            arch: aarch64
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri:build -- --target ${{ matrix.target }}

      - name: Rename updater artifacts by arch
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          if [ -f "$BUNDLE_DIR/Conflux Home.app.tar.gz" ]; then
            mv "$BUNDLE_DIR/Conflux Home.app.tar.gz" "$BUNDLE_DIR/Conflux.Home_${{ matrix.arch }}.app.tar.gz"
            mv "$BUNDLE_DIR/Conflux Home.app.tar.gz.sig" "$BUNDLE_DIR/Conflux.Home_${{ matrix.arch }}.app.tar.gz.sig"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  # ── Generate updates.json (all platforms) ──
  generate-updates-json:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download .sig files from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/sigs
          gh release download "${{ github.ref_name }}" \
            --pattern '*.sig' \
            --dir /tmp/sigs/ \
            --repo "${{ github.repository }}" \
            --skip-existing

      - name: Generate updates.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          VER="${VERSION#v}"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"

          DEB_SIG=$(cat /tmp/sigs/*.deb.sig 2>/dev/null | head -1 || echo "")
          APPIMAGE_SIG=$(cat /tmp/sigs/*.AppImage.sig 2>/dev/null | head -1 || echo "")
          MSI_SIG=$(cat /tmp/sigs/*.msi.sig 2>/dev/null | head -1 || echo "")

          # macOS updater artifacts: .app.tar.gz.sig (one per arch)
          # Try to get x64 and aarch64 sigs separately by matching naming convention
          MAC_X64_SIG=$(find /tmp/sigs/ -name '*x64*.app.tar.gz.sig' -exec cat {} \; | head -1)
          MAC_ARM_SIG=$(find /tmp/sigs/ -name '*aarch64*.app.tar.gz.sig' -exec cat {} \; | head -1)
          # Fallback: if naming doesn't distinguish, use whatever .app.tar.gz.sig files exist
          if [ -z "$MAC_X64_SIG" ]; then
            ALL_MAC_SIGS=($(find /tmp/sigs/ -name '*.app.tar.gz.sig' -exec cat {} \;))
            MAC_X64_SIG="${ALL_MAC_SIGS[0]:-}"
            MAC_ARM_SIG="${ALL_MAC_SIGS[1]:-${ALL_MAC_SIGS[0]:-}}"
          fi

          cat > updates.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "${APPIMAGE_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Conflux.Home_${VER}_amd64.AppImage"
              },
              "linux-deb-x86_64": {
                "signature": "${DEB_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Conflux.Home_${VER}_amd64.deb"
              },
              "windows-x86_64": {
                "signature": "${MSI_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Conflux.Home_${VER}_x64.msi"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Conflux.Home_x64.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Conflux.Home_aarch64.app.tar.gz"
              }
            }
          }
          EOF

          echo "=== Generated updates.json ==="
          cat updates.json

      - name: Upload updates.json to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" updates.json --clobber

  # ── Android (.apk) ──
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & SDK components
        run: |
          sdkmanager --install \
            "ndk;27.2.12479018" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install npm dependencies
        run: npm ci

      - name: Init Tauri Android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
        run: npm run tauri android init

      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
        run: npm run tauri android build -- --apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
