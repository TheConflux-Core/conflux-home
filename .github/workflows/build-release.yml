name: Build & Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux (.deb) ──
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Patch version from tag
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          echo "Patching version to $VER"
          cat << 'PYEOF' > /tmp/patch_version.py
          import re, sys
          ver = sys.argv[1]
          for f in ['src-tauri/Cargo.toml', 'src-tauri/tauri.conf.json', 'package.json']:
              with open(f, 'r') as fh:
                  txt = fh.read()
              if f == 'src-tauri/Cargo.toml':
                  txt = re.sub(r'^version = .+$', f'version = "{ver}"', txt, flags=re.MULTILINE)
              else:
                  txt = re.sub(r'"version":\s*"[^"]*"', f'"version": "{ver}"', txt)
              with open(f, 'w') as fh:
                  fh.write(txt)
          PYEOF
          python3 /tmp/patch_version.py "$VER"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: "linux-2204"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libfuse2 \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Download bundled models
        env:
          MODEL_BASE_URL: ${{ secrets.MODEL_BASE_URL }}
        run: ./scripts/download-models.sh

      - name: Download llama-server binary
        env:
          LLAMA_SERVER_VERSION: ${{ secrets.LLAMA_SERVER_VERSION }}
          LLAMA_SERVER_PLATFORM: ubuntu-x64
        run: ./scripts/download-llama-server.sh

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VITE_MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          VITE_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VITE_CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          REPLICATE_API_KEY: ${{ secrets.REPLICATE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run tauri:build

      - name: Rename artifacts (remove version from filenames)
        run: |
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/deb/*.deb; do
            mv "$f" "src-tauri/target/release/bundle/deb/Conflux.Home_amd64.deb"
          done
          for f in src-tauri/target/release/bundle/deb/*.deb.sig; do
            mv "$f" "src-tauri/target/release/bundle/deb/Conflux.Home_amd64.deb.sig"
          done

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.sig

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp src-tauri/target/release/bundle/deb/Conflux.Home_amd64.deb s3://${{ secrets.R2_BUCKET }}/Conflux.Home_amd64.deb --endpoint-url ${{ secrets.R2_ENDPOINT }}

  # ── Windows (.msi) ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch version from tag
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          echo "Patching version to $VER"
          cat << 'PYEOF' > /tmp/patch_version.py
          import re, sys
          ver = sys.argv[1]
          for f in ['src-tauri/Cargo.toml', 'src-tauri/tauri.conf.json', 'package.json']:
              with open(f, 'r') as fh:
                  txt = fh.read()
              if f == 'src-tauri/Cargo.toml':
                  txt = re.sub(r'^version = .+$', f'version = "{ver}"', txt, flags=re.MULTILINE)
              else:
                  txt = re.sub(r'"version":\s*"[^"]*"', f'"version": "{ver}"', txt)
              with open(f, 'w') as fh:
                  fh.write(txt)
          PYEOF
          python3 /tmp/patch_version.py "$VER"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Download bundled models
        shell: bash
        env:
          MODEL_BASE_URL: ${{ secrets.MODEL_BASE_URL }}
        run: ./scripts/download-models.sh

      - name: Download llama-server binary
        shell: bash
        env:
          LLAMA_SERVER_VERSION: ${{ secrets.LLAMA_SERVER_VERSION }}
          LLAMA_SERVER_PLATFORM: win-avx2-x64
        run: ./scripts/download-llama-server.sh

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VITE_MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          VITE_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VITE_CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          REPLICATE_API_KEY: ${{ secrets.REPLICATE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run tauri:build

      - name: Rename artifacts (remove version from filenames)
        shell: bash
        run: |
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/msi/*.msi; do
            mv "$f" "src-tauri/target/release/bundle/msi/Conflux.Home_x64.msi"
          done
          for f in src-tauri/target/release/bundle/msi/*.msi.sig; do
            mv "$f" "src-tauri/target/release/bundle/msi/Conflux.Home_x64.msi.sig"
          done
          for f in src-tauri/target/release/bundle/nsis/*-setup.exe; do
            mv "$f" "src-tauri/target/release/bundle/nsis/Conflux.Home_x64-setup.exe"
          done
          for f in src-tauri/target/release/bundle/nsis/*.nsis.zip.sig; do
            mv "$f" "src-tauri/target/release/bundle/nsis/Conflux.Home_x64-setup.exe.sig"
          done
          for f in src-tauri/target/release/bundle/nsis/*.exe.sig; do
            mv "$f" "src-tauri/target/release/bundle/nsis/Conflux.Home_x64-setup.exe.sig"
          done

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp src-tauri/target/release/bundle/nsis/Conflux.Home_x64-setup.exe s3://${{ secrets.R2_BUCKET }}/Conflux.Home_x64-setup.exe --endpoint-url ${{ secrets.R2_ENDPOINT }}
          aws s3 cp src-tauri/target/release/bundle/msi/Conflux.Home_x64.msi s3://${{ secrets.R2_BUCKET }}/Conflux.Home_x64.msi --endpoint-url ${{ secrets.R2_ENDPOINT }}

  # ── macOS (.dmg — x64 + aarch64) ──
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x64
          - target: aarch64-apple-darwin
            arch: aarch64
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Patch version from tag
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          echo "Patching version to $VER"
          cat << 'PYEOF' > /tmp/patch_version.py
          import re, sys
          ver = sys.argv[1]
          for f in ['src-tauri/Cargo.toml', 'src-tauri/tauri.conf.json', 'package.json']:
              with open(f, 'r') as fh:
                  txt = fh.read()
              if f == 'src-tauri/Cargo.toml':
                  txt = re.sub(r'^version = .+$', f'version = "{ver}"', txt, flags=re.MULTILINE)
              else:
                  txt = re.sub(r'"version":\s*"[^"]*"', f'"version": "{ver}"', txt)
              with open(f, 'w') as fh:
                  fh.write(txt)
          PYEOF
          python3 /tmp/patch_version.py "$VER"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Download bundled models
        shell: bash
        env:
          MODEL_BASE_URL: ${{ secrets.MODEL_BASE_URL }}
        run: ./scripts/download-models.sh

      - name: Download llama-server binary
        shell: bash
        env:
          LLAMA_SERVER_VERSION: ${{ secrets.LLAMA_SERVER_VERSION }}
          LLAMA_SERVER_PLATFORM: ${{ matrix.arch == 'x64' && 'macos-x64' || 'macos-arm64' }}
        run: ./scripts/download-llama-server.sh

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VITE_MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          VITE_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VITE_CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          REPLICATE_API_KEY: ${{ secrets.REPLICATE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run tauri:build -- --target ${{ matrix.target }}

      - name: Rename updater artifacts by arch
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          if [ -f "$BUNDLE_DIR/Conflux Home.app.tar.gz" ]; then
            mv "$BUNDLE_DIR/Conflux Home.app.tar.gz" "$BUNDLE_DIR/Conflux.Home_${{ matrix.arch }}.app.tar.gz"
            mv "$BUNDLE_DIR/Conflux Home.app.tar.gz.sig" "$BUNDLE_DIR/Conflux.Home_${{ matrix.arch }}.app.tar.gz.sig"
          fi

      - name: Rename DMG (remove version from filename)
        run: |
          shopt -s nullglob
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          for f in "$DMG_DIR"/*.dmg; do
            mv "$f" "$DMG_DIR/Conflux.Home_${{ matrix.arch }}.dmg"
          done

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          aws s3 cp "$DMG_DIR/Conflux.Home_${{ matrix.arch }}.dmg" s3://${{ secrets.R2_BUCKET }}/Conflux.Home_${{ matrix.arch }}.dmg --endpoint-url ${{ secrets.R2_ENDPOINT }}

  # ── Generate updates.json (all platforms) ──
  generate-updates-json:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download .sig files from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/sigs
          gh release download "${{ github.ref_name }}" \
            --pattern '*.sig' \
            --dir /tmp/sigs/ \
            --repo "${{ github.repository }}" \
            --skip-existing \
            || echo "No sig files found (this is OK if signing is disabled)"

      - name: Generate updates.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          VER="${VERSION#v}"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"

          DEB_SIG=$(cat /tmp/sigs/*.deb.sig 2>/dev/null | head -1 || echo "")
          NSIS_SIG=$(cat /tmp/sigs/*.exe.sig 2>/dev/null | head -1 || echo "")

          # macOS updater artifacts: .app.tar.gz.sig (one per arch)
          # Try to get x64 and aarch64 sigs separately by matching naming convention
          MAC_X64_SIG=$(find /tmp/sigs/ -name '*x64*.app.tar.gz.sig' -exec cat {} \; 2>/dev/null | head -1 || echo "")
          MAC_ARM_SIG=$(find /tmp/sigs/ -name '*aarch64*.app.tar.gz.sig' -exec cat {} \; 2>/dev/null | head -1 || echo "")
          # Fallback: if naming doesn't distinguish, use whatever .app.tar.gz.sig files exist
          if [ -z "$MAC_X64_SIG" ]; then
            ALL_MAC_SIGS=($(find /tmp/sigs/ -name '*.app.tar.gz.sig' -exec cat {} \; 2>/dev/null || echo ""))
            MAC_X64_SIG="${ALL_MAC_SIGS[0]:-}"
            MAC_ARM_SIG="${ALL_MAC_SIGS[1]:-${ALL_MAC_SIGS[0]:-}}"
          fi

          cat > updates.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "${DEB_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Conflux.Home_amd64.deb"
              },
              "windows-x86_64": {
                "signature": "${NSIS_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Conflux.Home_x64-setup.exe"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Conflux.Home_x64.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Conflux.Home_aarch64.app.tar.gz"
              }
            }
          }
          EOF

          echo "=== Generated updates.json ==="
          cat updates.json

      - name: Upload updates.json to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" updates.json --clobber

  # ── Android (.apk) ──
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch version from tag
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          echo "Patching version to $VER"
          cat << 'PYEOF' > /tmp/patch_version.py
          import re, sys
          ver = sys.argv[1]
          for f in ['src-tauri/Cargo.toml', 'src-tauri/tauri.conf.json', 'package.json']:
              with open(f, 'r') as fh:
                  txt = fh.read()
              if f == 'src-tauri/Cargo.toml':
                  txt = re.sub(r'^version = .+$', f'version = "{ver}"', txt, flags=re.MULTILINE)
              else:
                  txt = re.sub(r'"version":\s*"[^"]*"', f'"version": "{ver}"', txt)
              with open(f, 'w') as fh:
                  fh.write(txt)
          PYEOF
          python3 /tmp/patch_version.py "$VER"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & SDK components
        run: |
          sdkmanager --install \
            "ndk;27.2.12479018" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install npm dependencies
        run: npm ci


      - name: Init Tauri Android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
        run: npm run tauri android init

      - name: Generate app icons (Android + desktop)
        run: npm run tauri icon -- src-tauri/icons/icon-master.png

      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          REPLICATE_API_KEY: ${{ secrets.REPLICATE_API_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VITE_MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          VITE_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VITE_CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run tauri android build -- --apk

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
          APK_PATH=$(find src-tauri/gen/android/app/build/outputs -name "*.apk" -type f | head -1)
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign" -v -p 4 "$APK_PATH" "${APK_PATH%.apk}-aligned.apk"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" sign \
            --ks /tmp/release.keystore \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out "${APK_PATH%.apk}-signed.apk" \
            "${APK_PATH%.apk}-aligned.apk"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" verify "${APK_PATH%.apk}-signed.apk"
          mv "${APK_PATH%.apk}-signed.apk" "$APK_PATH"

      - name: Rename APK (remove version from filename)
        run: |
          shopt -s nullglob
          for f in src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk; do
            mv "$f" "src-tauri/gen/android/app/build/outputs/apk/universal/release/Conflux.Home_android.apk"
          done

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk

      - name: Upload APK to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp src-tauri/gen/android/app/build/outputs/apk/universal/release/Conflux.Home_android.apk s3://${{ secrets.R2_BUCKET }}/Conflux.Home_android.apk --endpoint-url ${{ secrets.R2_ENDPOINT }}
