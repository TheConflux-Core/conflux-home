name: 🐛 Bug Report
description: Report a bug or crash in Conflux Home
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below to help us reproduce and fix the issue.

  - type: input
    id: title
    attributes:
      label: Title
      description: A brief, descriptive title for the bug
      placeholder: "e.g. Kitchen meal planner crashes on week view"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What operating system are you using?
      options:
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
    validations:
      required: true

  - type: dropdown
    id: feature
    attributes:
      label: App / Feature Affected
      description: Which part of Conflux Home is affected?
      options:
        - Dashboard
        - Chat
        - Budget
        - Kitchen
        - Life Autopilot
        - Dreams
        - Feed
        - Games
        - Home
        - Marketplace
        - Settings
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      description: Clear description of what went wrong
      placeholder: "Describe the bug in detail..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: "I expected..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Instead, what happened was..."
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: If applicable, attach a screenshot showing the issue
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Gateway Logs
      description: |
        If you have gateway logs, paste them here. You can find them at:
        - **macOS/Linux:** `~/.openclaw/logs/gateway.log`
        - **Windows:** `%USERPROFILE%\.openclaw\logs\gateway.log`
        - Or use the "Copy Logs" button in Settings → About
      render: shell
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: false
